<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Miro Settings</title>
  <style>
    :root {
      color-scheme: light;
      --cream: #fbf7f0;
      --paper: #fffdf9;
      --border: #e6ddd1;
      --text: #2f261e;
      --muted: #6b6056;
      --accent: #6474e8;
      --accent-soft: #eef1ff;
      --warn-bg: #fff6e8;
      --warn-border: #f1d19e;
      --success: #35664f;
      --error: #9d4a3a;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
      background: var(--cream);
      color: var(--text);
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--paper);
      padding: 16px;
      box-shadow: 0 10px 24px rgba(47, 38, 30, 0.06);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      font-size: 12px;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      width: 50%;
      padding: 10px 12px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    button.secondary {
      background: var(--accent-soft);
      color: var(--text);
    }

    #status {
      min-height: 18px;
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    #status[data-tone="success"] { color: var(--success); }
    #status[data-tone="error"] { color: var(--error); }
    #status[data-tone="muted"] { color: var(--muted); }

    .warn {
      margin-top: 14px;
      padding: 10px 12px;
      border: 1px solid var(--warn-border);
      border-radius: 14px;
      background: var(--warn-bg);
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Miro settings</h1>
    <p>Add an OpenAI API key so Miro can generate a live session reflection for usability testing.</p>
    <label for="apiKey">OpenAI API key</label>
    <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" spellcheck="false" />
    <div class="row">
      <button id="saveBtn">Save key</button>
      <button id="clearBtn" class="secondary">Clear</button>
    </div>
    <div id="status" data-tone="muted"></div>
    <div class="warn">
      For this prototype, the key is stored in extension local storage. That is fine for testing, but it is not secure enough for a production release.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
